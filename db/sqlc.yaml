version: "2"

sql:
  - engine: postgresql
    schema:
      - sqlc_schema_prelude.sql
      - migrations/000002_core_schema.up.sql
    queries:
      - queries
    database:
      uri: ${SENTINELFLOW_SQLC_DATABASE_URI}
    strict_function_checks: true
    gen:
      go:
        package: dbsql
        out: sqlcgen
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        emit_pointers_for_null_types: true
