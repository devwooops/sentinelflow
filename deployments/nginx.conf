server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 16k;
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header Cache-Control "no-store" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location = /health/live {
        access_log off;
        return 204;
    }

    location /api/ {
        set $api_upstream http://api:8083;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Host "";
        proxy_set_header X-Forwarded-Port "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 180s;
        proxy_send_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
