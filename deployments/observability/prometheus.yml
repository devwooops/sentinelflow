global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/control-plane-alerts.yaml

scrape_configs:
  - job_name: sentinelflow-gateway
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 172.29.0.2:9090
  - job_name: sentinelflow-control
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 172.29.0.3:9091
