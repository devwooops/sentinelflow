# SentinelFlow demo database trust boundary.
# Local maintenance and the exact control subnet use SCRAM. Every other source
# is rejected before PostgreSQL attempts credential authentication.
local   all   all                         scram-sha-256
# Docker Desktop/OrbStack may SNAT cross-bridge traffic to the control bridge
# gateway. No SentinelFlow service owns that address, so fail it closed before
# allowing the service-address range.
host    all   all   172.32.0.1/32         reject
host    all   all   172.32.0.0/24         scram-sha-256
host    all   all   0.0.0.0/0             reject
host    all   all   ::0/0                 reject
